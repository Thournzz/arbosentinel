# ══════════════════════════════════════════════════════════════════════════════
# application-prod.properties — Production profile (Railway deployment)
# Active when: SPRING_PROFILES_ACTIVE=prod
# ALL secrets come from Railway environment variables — never hardcoded here
# ══════════════════════════════════════════════════════════════════════════════

# ── Database (Railway injects DATABASE_URL automatically) ─────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# ── Server ────────────────────────────────────────────────────────────────────
# Railway injects PORT automatically
server.port=${PORT:9191}

# ── JWT ───────────────────────────────────────────────────────────────────────
arbosentinel.jwt.secret=${JWT_SECRET}
arbosentinel.jwt.expiration=86400000

# ── ML service ────────────────────────────────────────────────────────────────
arbosentinel.ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ── ETL data ─────────────────────────────────────────────────────────────────
# Data files not present in production — ETL jobs will skip gracefully
arbosentinel.data.dir=${DATA_DIR:/tmp}
arbosentinel.etl.batch-size=500

# ── Cache ─────────────────────────────────────────────────────────────────────
spring.cache.type=caffeine

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.arbosentinel=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── CORS — allow Vercel frontend ──────────────────────────────────────────────
arbosentinel.cors.allowed-origins=${CORS_ORIGINS:https://arbosentinel.vercel.app}
